<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — Page Not Found | Lazack Organisation</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root{--blue:#2563eb;--blue-d:#1a45b8;--ink:#0a0f1e;--muted:#6b7491;--surface:#fff;--border:#e4e8f5;}
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:'DM Sans',sans-serif;background:var(--surface);color:var(--ink);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;position:relative;overflow:hidden;}
    .blob{position:absolute;border-radius:50%;filter:blur(80px);opacity:.5;pointer-events:none;}
    .blob-1{width:500px;height:500px;background:radial-gradient(circle,#dbeafe,transparent 70%);top:-100px;right:-100px;}
    .blob-2{width:400px;height:400px;background:radial-gradient(circle,#ede9fe,transparent 70%);bottom:-80px;left:-80px;}
    .card{background:rgba(255,255,255,.85);backdrop-filter:blur(20px);border:1.5px solid var(--border);border-radius:24px;padding:56px 48px;max-width:480px;width:100%;text-align:center;box-shadow:0 24px 64px rgba(10,15,30,.1);position:relative;z-index:1;animation:fadeUp .7s cubic-bezier(.16,1,.3,1);}
    @keyframes fadeUp{from{opacity:0;transform:translateY(24px);}to{opacity:1;transform:translateY(0);}}
    .logo{display:inline-flex;align-items:center;gap:10px;font-family:'Syne',sans-serif;font-size:1.1rem;font-weight:800;text-decoration:none;color:var(--ink);margin-bottom:40px;}
    .logo-mark{width:32px;height:32px;background:linear-gradient(135deg,var(--blue),#7c3aed);border-radius:9px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:.85rem;}
    .logo em{font-style:normal;color:var(--blue);}
    .error-num{font-family:'Syne',sans-serif;font-size:6rem;font-weight:800;line-height:1;background:linear-gradient(135deg,var(--blue),#7c3aed);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:16px;}
    h1{font-family:'Syne',sans-serif;font-size:1.5rem;font-weight:700;margin-bottom:12px;}
    p{color:var(--muted);font-size:.95rem;line-height:1.65;margin-bottom:36px;}
    .btn{display:inline-flex;align-items:center;gap:8px;padding:13px 26px;background:var(--blue);color:#fff;border-radius:50px;font-size:.95rem;font-weight:600;text-decoration:none;transition:all .3s ease;}
    .btn:hover{background:var(--blue-d);transform:translateY(-2px);box-shadow:0 8px 24px rgba(37,99,235,.35);}
    footer{margin-top:40px;font-size:.82rem;color:var(--muted);position:relative;z-index:1;}
  </style>
</head>
<body>
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>

  <div class="card">
    <a href="/" class="logo">
      <div class="logo-mark"><i class="fas fa-bolt"></i></div>
      Lazack<em>Org</em>
    </a>
    <div class="error-num">404</div>
    <h1>Page Not Found</h1>
    <p>Oops! The page you're looking for doesn't exist or has been moved. Let's get you back on track.</p>
    <a href="/" class="btn"><i class="fas fa-arrow-left"></i> Back to Home</a>
  </div>

  <footer>&copy; <span id="yr"></span> Lazack Organisation. All rights reserved.</footer>
  <script>document.getElementById('yr').textContent = new Date().getFullYear();</script>
</body>
</html>
